apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-proxy
  labels:
    app: vllm-proxy
spec:
  replicas: 3
  selector:
    matchLabels:
      app: vllm-proxy
  template:
    metadata:
      labels:
        app: vllm-proxy
    spec:
      containers:
      - name: proxy
        image: vllm-proxy:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        - containerPort: 9090
          name: metrics
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        livenessProbe:
          httpGet:
            path: /healthcheck
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthcheck
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /app/configs
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: vllm-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-proxy
  labels:
    app: vllm-proxy
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  selector:
    app: vllm-proxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-proxy-config
data:
  config.yaml: |
    server:
      host: 0.0.0.0
      port: 8000
      max_connections: 100000
      request_timeout: 30s
      read_timeout: 30s
      write_timeout: 30s
      idle_timeout: 120s

    prefillers:
      - host: prefiller-1.default.svc.cluster.local
        port: 8100
        weight: 1
      - host: prefiller-2.default.svc.cluster.local
        port: 8100
        weight: 1

    decoders:
      - host: decoder-1.default.svc.cluster.local
        port: 8200
        weight: 1
      - host: decoder-2.default.svc.cluster.local
        port: 8200
        weight: 1

    connection_pool:
      max_idle_conns: 10000
      max_conns_per_host: 1000
      idle_conn_timeout: 90s
      handshake_timeout: 10s
      response_header_timeout: 30s

    retry:
      max_retries: 3
      base_delay: 200ms
      max_delay: 5s

    logging:
      level: info
      format: json

    metrics:
      enabled: true
      path: /metrics
      port: 9090
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: vllm-proxy-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: vllm-proxy
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm-proxy
  labels:
    app: vllm-proxy
spec:
  selector:
    matchLabels:
      app: vllm-proxy
  endpoints:
  - port: metrics
    interval: 15s
    path: /metrics
