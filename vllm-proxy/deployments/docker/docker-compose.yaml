version: '3.8'

services:
  proxy:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "8000:8000"
      - "9090:9090"
    volumes:
      - ../../configs/config.yaml:/app/configs/config.yaml:ro
    environment:
      - VLLM_PROXY_LOGGING_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  proxy-2:
    build:
      context: ../..
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "8001:8000"
      - "9091:9090"
    volumes:
      - ../../configs/config.yaml:/app/configs/config.yaml:ro
    environment:
      - VLLM_PROXY_LOGGING_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8000/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - proxy
      - proxy-2
    restart: unless-stopped
