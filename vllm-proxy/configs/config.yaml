server:
  host: 0.0.0.0
  port: 8000
  max_connections: 100000
  request_timeout: 30s
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

prefillers:
  - host: 10.0.0.1
    port: 8100
    weight: 1
  - host: 10.0.0.2
    port: 8101
    weight: 1

decoders:
  - host: 10.0.0.3
    port: 8200
    weight: 1
  - host: 10.0.0.4
    port: 8201
    weight: 1

connection_pool:
  max_idle_conns: 10000
  max_conns_per_host: 1000
  idle_conn_timeout: 90s
  handshake_timeout: 10s
  response_header_timeout: 30s

retry:
  max_retries: 3
  base_delay: 200ms
  max_delay: 5s

logging:
  level: info
  format: json

metrics:
  enabled: true
  path: /metrics
  port: 9090
